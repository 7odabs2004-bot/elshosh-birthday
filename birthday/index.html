<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  background: radial-gradient(circle at top, #2a0f1f, #120a10);
}

/* ===== PAGE SYSTEM ===== */
.page{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:92%;
  max-width:430px;
  text-align:center;
}

.page.active{
  display:block;
}

/* ===== TEXT ===== */
h1,h2,p{
  color:#111;
  font-weight:400;
  text-shadow:0 2px 10px rgba(0,0,0,0.15);
}

/* ===== ENVELOPE ===== */
.envelope{
  width:190px;
  height:130px;
  margin:25px auto;
  position:relative;
  background:linear-gradient(145deg,#ff4d88,#ffb6c1);
  border-radius:14px;
  cursor:pointer;
  transform:perspective(900px) rotateX(10deg);
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  border-left:95px solid transparent;
  border-right:95px solid transparent;
  border-top:75px solid #ffd1e8;
}

/* ===== IMAGE STACK (P2) ===== */
.img-stack{
  position:relative;
  margin:35px 0;
  display:flex;
  justify-content:center;
}

.img.bottom{
  width:210px;
  height:210px;
  object-fit:cover;
  border-radius:22px;
  transform:rotate(-3deg);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.img.top{
  width:140px;
  height:140px;
  object-fit:cover;
  position:absolute;
  top:-20px;
  right:10px;
  border-radius:18px;
  border:3px solid white;
  box-shadow:0 15px 30px rgba(255,105,180,0.4);
}

/* ===== P3 SLIDER ===== */
.slider{
  display:flex;
  justify-content:center;
  margin:30px 0;
}

.slider img{
  width:240px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  transition:0.5s ease;
}

/* ===== PAGE 4 IMAGE ===== */
.birthday-img{
  width:300px;
  height:auto;
  border-radius:18px;
  margin:20px auto;
  display:block;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* ===== SHAWARMA ===== */
.shawarma-img{
  width:100%;
  max-width:320px;
  border-radius:16px;
  margin:15px auto;
  display:block;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.choices{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

#result{
  margin-top:20px;
  font-size:18px;
  font-weight:400;
}

/* ===== BUTTON ===== */
button{
  padding:12px 22px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ffb6c1,#ffd1dc);
  color:#111;
  cursor:pointer;
}

/* ===== HEARTS ===== */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:14px;
  animation:rise 6s linear;
}

@keyframes rise{
  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

/* ===== MOBILE ===== */
@media (max-width:480px){
  .page{width:92%;}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h2>هدية شوشتي 💌</h2>
  <div class="envelope" onclick="go(2)"></div>
  <p>دوسي علي الظرف</p>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">

  <h2>16/7/2008</h2>
  <p>زي انهاردا اتولدت اجمل و احلي شوشو علي كوكب الارض ❤️</p>
  <p>اجمل من يتم ال18 سنة💖</p>
  <h3>🎧💗</h3>

<audio controls>
  <source src="voice.mp3" type="audio/mpeg">
</audio>

  <div class="img-stack">
    <img src="selfie.jpg" class="img bottom">
    <img src="eyes.jpg" class="img top">
  </div>

  <button onclick="go(3)">تسلملي 😂</button>
</div>

<!-- PAGE 3 (AUTO SLIDER) -->
<div class="page" id="p3">

  <h2>احذرررر⚠️</h2>
  <p>يحتوي هذا الالبوم علي صور لاجمل بنوته في العالم❤️🌚</p>
  <p>يخررررابي علي الجمال يجدعاااان😍💗</p>

  <div class="slider">
    <img id="slideImg" src="img1.jpg">
  </div>

  <button onclick="go(4)">شكرا 💕</button>

</div>

<!-- PAGE 4 -->
<div class="page" id="p4">

  <h2>💗كل سنة و انتي طيبة يا احلي شوش💗</h2>

  <img src="birthday-banner.jpg" class="birthday-img">
  <p id="typingText"></p>
  

  <input id="wish" placeholder="اكتبي امنيتك هنا...">

  <button id="wishBtn" style="display:none;" onclick="go(5)">
    اتمنيت ✨
  </button>

</div>

<!-- PAGE 5 -->
<div class="page" id="p5">



  <img src="shawarma.jpg" class="shawarma-img">

  <p2>ايه رايك في الهدية 🙂</p2>

  <div class="choices">
    <button onclick="answer(true)">حلوه اوي بجد😍</button>
    <button onclick="answer(false)">معجبتنيش🙃</button>
  </div>

  <div id="result"></div>

  <button id="finalBtn" style="display:none;" onclick="finishAll()">
     خلاص حلوة 😂💖
  </button>

</div>

<script>

/* NAV */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  setTimeout(()=>{
    document.getElementById("p"+p).classList.add("active");
  },200);
}

/* WISH BUTTON */
document.getElementById("wish").addEventListener("input",function(){
  document.getElementById("wishBtn").style.display =
    this.value.length ? "block" : "none";
});

/* AUTO SLIDER */
let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg","img6.jpg","img7.jpg","img8.jpg","img9.jpg","img10.jpg","img11.jpg"];
let index = 0;

function updateImg(){
  const img = document.getElementById("slideImg");
  if(img){
    img.style.opacity = 0;
    setTimeout(()=>{
      img.src = images[index];
      img.style.opacity = 1;
    },200);
  }
}

setInterval(()=>{
  index++;
  if(index >= images.length) index = 0;
  updateImg();
},2000);

/* SHAWARMA LOGIC */
function answer(ok){
  const result = document.getElementById("result");
  const btn = document.getElementById("finalBtn");
  const choices = document.querySelector(".choices");

  choices.style.display = "none";

  if(ok){
    result.innerHTML = "قلبي اقسم بالله خدي بوسة💋😘";
    launchHearts();
    btn.style.display = "none";
  }else{
    result.innerHTML = "كدا هخرج عن شعوري 🙂";
    btn.style.display = "block";
  }
}

function finishAll(){
  document.getElementById("p5").innerHTML = `
    <h1>ايوا كدا😂</h1>
    <p>خدي بوسة عشان انتي شطورة💋😘</p>
  `;
  launchHearts();
}

/* HEARTS */
function launchHearts(){
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.innerHTML="💖";
      h.classList.add("heart");
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),4000);
    },i*100);
  }
}

setInterval(()=>{
  let h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

const text = ` من بين كل تفاصيلك الجميلة…
كانت عيونك هي التفصيلة الأقرب لقلبي 💗

عيونك صادقة… بتحكي عنك من غير ما تتكلمي ❤️
وعيونك مش بس جميلة… دي قادرة تهدي أي حاجة جوا الواحد،
بمجرد ما يتأمل فيها 😍

كل سنة وانتي طيبة يا أحلى وأقرب وأجمل صاحبة في حياتي كلها ❤️

يمكن لو اتكلمت من هنا لبكره مش هقدر أوصف انتي قد إيه مميزة بالنسبة لي،
بس أنا بجد ممتن وفرحان بكل لحظة انتي موجودة فيها في حياتي 💕

سنة جديدة سعيدة عليكي 💖
أتمنى تكون مليانة فرح وضحك ونجاح،
وتحققي كل حاجة نفسك فيها.

وإن شاء الله كل الأيام الجاية تبقى أحلى من اللي فاتت،
وتفضلي دايمًا كده… جميلة، مميزة، وقريبة من قلبي.

أتمنى المفاجأة البسيطة دي تكون عجبتك ❤️

ومع بداية سنة جديدة من عمرك…
أتمنى تتمني أمنية من قلبك 💫
وإن شاء الله تتحقق… ويمكن أكتر كمان ✨

كل سنة وانتي طيبة يا روح فلبي يا أجمل وأرق بنوته 🎉❤️`;

let i = 0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40); // السرعة (قللها = أسرع)
  }
}

/* تشغيل عند فتح الصفحة */
function startTyping(){
  i = 0;
  document.getElementById("typingText").innerHTML = "";
  typeEffect();
}
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("p"+p).classList.add("active");

  if(p === 4){ // غير الرقم حسب الصفحة اللي فيها الرسالة
    startTyping();
  }
}
</script>

</body>
</html>
